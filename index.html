<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>--- ΑΝΕΡΓΟΙ ΠΟΔΟΧΩΡΙΟΥ - OFFICIAL SITE ---</title>
    <link rel="stylesheet" href="index.css">
    
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>

    <div class="main-wrapper">
        
        <header>
            <marquee behavior="alternate" scrollamount="5" class="main-title">
                *** ΚΑΛΩΣΗΡΘΑΤΕ ΣΤΟ ΕΠΙΣΗΜΟ SITE ΤΩΝ ΑΝΕΡΓΩΝ ΠΟΔΟΧΩΡΙΟΥ ***
            </marquee>
            
            <div class="hero-container">
                <img src="Copilot_20260422_164418.png" alt="Under Construction" class="construction-gif">
                <h1 class="blink">ΠΑΤΗΣΕ <br> START</h1>
                <img src="Copilot_20260422_165917.png" alt="Under Construction" class="construction-gif mobile-hidden">
            </div>
            
            <button class="start-btn" onclick="goToSelection()">>>> START GAME <<<</button>
        </header>

        <main>
            <aside class="sidebar left-sidebar">
                <div class="ad-box">ΔΙΑΦΗΜΙΣΗ: <br> Καφενείο "Ο Κούλης" - ΜΕ ΠΑΡΟΧΗ REELS 24/7</div>
                <img src="Copilot_20260422_165007.png" alt="Crazy Gif" class="side-gif">
            </aside>

            <section class="content">
                <h2 style="color: cyan; text-shadow: 2px 2px black;">ΕΦΗΜΕΡΙΔΑ ΑΝΕΡΓΩΝ:</h2>
                
                <div id="articles-container">
                    <p style="color: #888;">Φόρτωση ειδήσεων...</p>
                </div>
            </section>

            <aside class="sidebar right-sidebar">
                <div class="counter">
                     <br>
                    <img src="674434248_17882497497538318_6494734893109787096_n.jpg" alt="Counter">
                </div>
            </aside>
        </main>

        <footer>
            <p>Created by: ΑΝΕΡΓΟΙ ΠΟΔΟΧΩΡΙΟΥ | © 2026</p>
            
            <button id="admin-link" style="display: none; background: #ff00ff; color: white; border: 2px solid white; padding: 10px; margin-bottom: 15px; cursor: pointer; font-family: 'Courier New', Courier, monospace; font-weight: bold; width: 100%; max-width: 300px;" onclick="window.location.href='/admin/'">
                >>> ΕΙΣΟΔΟΣ ΣΤΟ ΠΑΝΕΛ ΔΙΑΧΕΙΡΙΣΗΣ <<<
            </button>

            <div data-netlify-identity-button></div>
        </footer>
    </div>

    <script>
        // 1. Φόρτωση Άρθρων
        async function loadArticles() {
            try {
                const response = await fetch('articles.json?v=' + Date.now());
                const data = await response.json();
                const container = document.getElementById('articles-container');
                container.innerHTML = ''; 

                const articles = data.articles || [];

                if (articles.length === 0) {
                    container.innerHTML = "<p style='color: #888;'>Δεν υπάρχουν νέα σήμερα.</p>";
                    return;
                }

                articles.forEach(art => {
                    const artHTML = `
                        <div class="article-card">
                            <h3 style="color: yellow; margin-bottom: 5px;">> ${art.title}</h3>
                            <small style="color: #00ff00; font-size: 0.7rem;">Ημερομηνία: ${art.date}</small>
                            <p style="color: white; margin-top: 10px; font-size: 0.9rem;">${art.content}</p>
                        </div>
                    `;
                    container.innerHTML += artHTML;
                });
            } catch (err) {
                console.error("Error loading articles:", err);
                document.getElementById('articles-container').innerHTML = "<p>Δεν υπάρχουν νέα σήμερα.</p>";
            }
        }

        // 2. Identity Logic για το Admin Button
        if (window.netlifyIdentity) {
            const adminBtn = document.getElementById('admin-link');

            const updateAdminUI = (user) => {
                if (user) {
                    adminBtn.style.display = 'inline-block'; 
                } else {
                    adminBtn.style.display = 'none'; 
                }
            };

            window.netlifyIdentity.on("init", user => {
                updateAdminUI(user);
            });

            window.netlifyIdentity.on("login", user => {
                updateAdminUI(user);
                window.netlifyIdentity.close();
            });

            window.netlifyIdentity.on("logout", () => {
                updateAdminUI(null);
            });
        }

        window.onload = () => {
            loadArticles();
        };

        function goToSelection() {
            window.location.href = 'select.html';
        }
    </script>
</body>
</html>
